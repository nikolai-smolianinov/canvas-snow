<head>

<body>
<button id="b_500" onclick="triggerVibrate()">Vibrate</button>
<div id="output"></div>
<div id="output2"></div>



<script>


    function triggerVibrate () {
        ReactNativeWebView.postMessage(JSON.stringify({type: 'VIBRATE', data: {pattern: [200, 150, 1000]}}))

    }

</script>
</body>
<style>
    body {
        padding: 40px;
    }
    button {
        margin-top: 20px;
        padding: 8px 12px;

    }
</style>
