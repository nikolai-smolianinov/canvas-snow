<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
<button id="b_500" onclick="triggerVibrate(500)">500</button>
<button id="b_1000" onclick="triggerVibrate(1000)">1000</button>
<button id="b_300 250 700" onclick="triggerPatternVibrate([300, 250, 700])">300 250 700</button>
<br>
<div id="output"></div>


<script>

    const vibrate = window.navigator.vibrate || window.navigator.webkitVibrate || window.navigator.mozVibrate || window.navigator.msVibrate;

    function triggerVibrate (ms) {
        vibrate(ms)
    }

    function triggerPatternVibrate (pattern) {
        vibrate(pattern)
    }

    document.getElementById('output').innerText = JSON.stringify(vibrate)

</script>
</body>
</html>
