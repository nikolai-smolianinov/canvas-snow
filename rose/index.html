<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>ROSE</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <img src="./rose.png" alt="роза">
    <input id="range" type="range" oninput="test()" min="0" max="1000" onchange="test()">
    <script>
        const input = document.getElementById('range')
        const test = function (e) {
            val = input.value
            document.body.style.backgroundColor = `rgba(38, 50, 56, ${val / 1000})`
        }
    </script>
</body>

<style>
    body {
        margin: 0;
        padding: 0;
        background-color: rgba(38, 50, 56, 1);
        display: flex;
        justify-content: center;
        align-content: center;
    }

    img {
        width: 60vw;
        height: 60vw;
        max-height: 600px;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        margin-top: 20px;
    }

    input {
        position: fixed;
        bottom: 20px;
        left: 50%;
        margin-left: -40vw;
        width: 80vw;
    }
</style>
</html>
